<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eric's Portfolio</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
            line-height: 1.6;
        }
        .btn {
            display: inline-block;
            padding: 15px 25px;
            background-color: #4285f4;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            margin: 10px;
            font-weight: bold;
        }
        .btn:hover {
            background-color: #357ae8;
        }
        .video-container {
            margin: 30px auto;
            max-width: 560px;
            width: 100%;
        }
        .responsive-iframe {
            width: 100%;
            height: 315px;
        }
        .vibe-code-note {
            font-size: 0.9em;
            color: #555;
            margin-top: 20px;
            font-style: italic;
        }
    </style>
</head>
<body>

    <h1>Portfolio Hub</h1>
    <p>Welcome to my professional portfolio.</p>

    <div class="video-container">
        <iframe class="responsive-iframe" 
                src="https://www.youtube.com/embed/oIDSkRjD38U?si=TjdI9QjzVKRuITex" 
                title="YouTube video player" 
                frameborder="0" 
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                referrerpolicy="strict-origin-when-cross-origin" 
                allowfullscreen>
        </iframe>
    </div>

    <div class="vibe-code-note">
        <p>This demo was rapid-prototyped using AI-assisted development ("vibe coding"), <br> 
        leveraging LLMs to iterate on functional logic and design.</p>
    </div>

    <a href="Sane Club Executive Briefing.pdf" class="btn" target="_blank">Executive Briefing</a>

</body>
</html>
